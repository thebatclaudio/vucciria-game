<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Belt-and-braces: nudge intermediate caches / browsers to revalidate
         the HTML shell on every navigation. Hashed JS/CSS bundles are
         already immutable thanks to Vite's content-hashed filenames, and
         the service worker handles its own freshness, but this prevents a
         stale index.html from ever serving a reference to a no-longer-cached
         asset on the first paint after a deploy. -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vucciria" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>VucciriaGame — Drink, draw, survive</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
