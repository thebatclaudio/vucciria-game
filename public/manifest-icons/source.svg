<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source artwork for PWA icons. Rendered to PNGs by
  @vite-pwa/assets-generator. Keep the focal artwork inside the
  central 60% (maskable safe zone) so the same source works for
  both standard and maskable variants.

  Palette matches the app theme:
    background  #f59e0b (beer-500, theme_color in manifest)
    glass body  #fef3c7 (beer-100)
    glass rim   #fffbeb (beer-50)
    whisky      #b45309 (beer-700)
    surface     #78350f (beer-900)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="VucciriaGame">
  <!-- Full-bleed background -->
  <rect width="512" height="512" fill="#f59e0b"/>

  <!-- Subtle radial highlight for depth -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!--
    Tumbler glass, centered.
    Outer footprint ~ 256 x 280, fully inside the 308x308 maskable safe zone
    (radius 40% of 512 = 205 from center; glass corners sit at <= 144 from center).
  -->
  <g transform="translate(128 116)">
    <!-- Glass body (slight trapezoid) -->
    <path d="M 14 8
             L 242 8
             L 226 274
             Q 224 290 208 290
             L 48 290
             Q 32 290 30 274
             Z"
          fill="#fef3c7"
          stroke="#78350f"
          stroke-width="10"
          stroke-linejoin="round"/>

    <!-- Whisky fill (~60% up the glass) -->
    <path d="M 24 116
             L 232 116
             L 222 274
             Q 220 286 208 286
             L 48 286
             Q 36 286 34 274
             Z"
          fill="url(#liquid)"/>

    <!-- Liquid meniscus -->
    <ellipse cx="128" cy="116" rx="104" ry="10" fill="#92400e"/>

    <!-- Highlight on left edge of glass -->
    <path d="M 36 28
             L 46 28
             L 40 260
             L 30 260 Z"
          fill="#ffffff"
          fill-opacity="0.45"/>

    <!-- Ice cube -->
    <rect x="92" y="138" width="58" height="58" rx="8"
          fill="#fffbeb" fill-opacity="0.85"
          stroke="#78350f" stroke-width="4"
          transform="rotate(-8 121 167)"/>
  </g>
</svg>
